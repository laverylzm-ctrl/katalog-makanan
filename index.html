<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lopier — E-Catalog</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <nav>
        <div class="logo">LOPIER</div>
      </nav>
    </header>

    <main>
      <section class="hero">
        <h1>Lopier <br /><span>Dining.</span></h1>
        <p>E-Catalog makanan pilihan dengan cita rasa autentik.</p>
      </section>

      <section class="menu-grid">
        <article class="menu-item">
          <img
            src="images/TrufflePasta.png"
            alt="Truffle Pasta"
            class="menu-img"
          />
          <div class="info">
            <h3>Truffle Pasta</h3>
            <p>Pasta dengan saus jamur truffle hitam.</p>
            <span class="price">Rp 85.000</span>
          </div>
        </article>

        <article class="menu-item">
          <img
            src="images/GrilledRibeye.png"
            alt="Grilled Ribeye"
            class="menu-img"
          />
          <div class="info">
            <h3>Grilled Ribeye</h3>
            <p>Daging sapi premium dengan saus rosemary.</p>
            <span class="price">Rp 150.000</span>
          </div>
        </article>
      </section>
    </main>
  </body>
</html>
